name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install
        run: npm ci

      - name: Fetch RSS
        run: node scripts/fetch-rss.mjs
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Prepare SPA fallback
        run: cp dist/client/index.html dist/client/404.html

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
